<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentGlass Studio</title>
    <link rel="manifest" href="manifest.json">
    
    <script>
        if (window.location.hostname !== "localhost" && !window.crossOriginIsolated) {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').then(() => {
                    setTimeout(() => { window.location.reload(); }, 300);
                });
            }
        }
    </script>
    
    <script type="module">
        import { KokoroTTS } from "https://cdn.jsdelivr.net/npm/kokoro-js@1.1.0/+esm";
        window.KokoroTTS = KokoroTTS;
    </script>

    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; background-color: #f0f3f6; color: #333; }
        .container { max-width: 600px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin: 20px auto; }
        h2 { color: #2c3e50; margin-top: 0; border-bottom: 2px solid #f1f2f6; padding-bottom: 12px; }
        #loginView { max-width: 400px; margin: 80px auto; text-align: center; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .input-box { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        
        #studioView { display: none; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        label { font-weight: bold; margin-bottom: 6px; color: #4a5568; font-size: 14px; }
        select, input[type="number"], .script-input { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; width: 100%; box-sizing: border-box; }
        
        .slide-card { background: #f8fafc; border: 1px solid #e2e8f0; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .slide-card h3 { margin: 0 0 15px 0; color: #1e3a8a; font-size: 16px; border-bottom: 1px dashed #cbd5e1; padding-bottom: 8px; }
        
        .btn { background-color: #3b82f6; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: bold; width: 100%; box-sizing: border-box; }
        #forceInstallContainer { display: none; background: #fffbeb; border: 1px solid #fef3c7; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        #statusLogger { margin-top: 20px; padding: 15px; border-radius: 6px; display: none; font-weight: bold; font-size: 14px; background-color: #e0f2fe; border-left: 4px solid #0284c7; color: #0369a1; white-space: pre-line; }
    </style>
</head>
<body>

    <div id="loginView">
        <h3 style="color: #2c3e50; margin-bottom: 20px;">Sign In to TalentGlass Studio</h3>
        <input type="text" id="username" class="input-box" placeholder="Username">
        <input type="password" id="password" class="input-box" placeholder="Password">
        <button type="button" class="btn" onclick="validateCredentials()">Authenticate Studio</button>
        <p id="loginError" style="color: #e11d48; display: none; margin-top: 15px; font-weight: bold; font-size: 13px;"></p>
    </div>

    <div id="studioView" class="container">
        
        <div id="forceInstallContainer">
            <p style="margin: 0 0 10px 0; font-size: 13px; color: #b45309; font-weight: bold;">📲 Browser link update ready. Install app directly onto your home screen:</p>
            <button type="button" class="btn" style="background-color: #d97706;" onclick="triggerManualPwaInstall()">Download & Install Studio App</button>
        </div>

        <h2>🎬 TalentGlass Studio</h2>
        <p style="font-size: 12px; color: #64748b; margin-top: -5px; margin-bottom: 25px;">Logged in as: <strong style="color: #3b82f6;">suvanam</strong> | Engine: <span id="engineStatus" style="color:#d97706; font-weight:bold;">Caching matrix cores...</span></p>
        
        <form id="studioForm">
            <div class="form-group">
                <label>Number of Presentation Slides:</label>
                <input type="number" id="totalSlides" min="1" max="10" value="1" oninput="generateSlideRows()">
            </div>

            <div id="slidesFormWrapper"></div>
            
            <button type="button" id="compileBtn" class="btn" style="background-color: #10b981; margin-top: 10px;" onclick="compileVideoOnDevice()" disabled>Awaiting AI Engine...</button>
        </form>

        <div id="statusLogger"></div>
    </div>

    <canvas id="renderCanvas" width="720" height="1280" style="display:none;"></canvas>

    <script>
        let globalTTSInstance = null;
        let deferredPrompt = null;

        const voiceOptionsHTML = `
            <optgroup label="🇺🇸 American Accent - Female">
                <option value="af_bella" selected>af_bella (Bella - Warm & Crisp)</option>
                <option value="af_nicole">af_nicole (Nicole - Professional)</option>
                <option value="af_sarah">af_sarah (Sarah - Bright)</option>
                <option value="af_sky">af_sky (Sky - Natural)</option>
            </optgroup>
            <optgroup label="🇺🇸 American Accent - Male">
                <option value="am_adam">am_adam (Adam - Deep Narration)</option>
                <option value="am_michael">am_michael (Michael - Smooth Corporate)</option>
            </optgroup>
            <optgroup label="🇬🇧 British Accent">
                <option value="bf_emma">bf_emma (Emma - Elegant)</option>
                <option value="bm_george">bm_george (George - Clear Male)</option>
            </optgroup>
        `;

        // Capture PWA installation configuration triggers natively
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('forceInstallContainer').style.display = 'block';
        });

        function triggerManualPwaInstall() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choice) => {
                    if (choice.outcome === 'accepted') {
                        document.getElementById('forceInstallContainer').style.display = 'none';
                    }
                    deferredPrompt = null;
                });
            } else {
                alert("Please tap your browser settings menu (3 dots or share button) and choose 'Add to Home Screen' to save this app link directly.");
            }
        }

        function validateCredentials() {
            const userVal = document.getElementById("username").value;
            const passVal = document.getElementById("password").value;
            if (userVal === "suvanam" && passVal === "2026") {
                document.getElementById("loginView").style.display = "none";
                document.getElementById("studioView").style.display = "block";
                generateSlideRows();
                initializeEngineEarly();
            } else {
                document.getElementById("loginError").innerText = "❌ Access Denied: Invalid credentials.";
                document.getElementById("loginError").style.display = "block";
            }
        }

        async function initializeEngineEarly() {
            try {
                if (globalTTSInstance) return;
                globalTTSInstance = await window.KokoroTTS.from_pretrained("onnx-community/Kokoro-82M-v1.0-ONNX", {
                    dtype: "q8",
                    device: "wasm",
                    quantized: true,
                    progress_callback: null
                });
                document.getElementById("engineStatus").innerHTML = "⚡ Engine Warm & Ready in RAM";
                document.getElementById("engineStatus").style.color = "#16a34a";
                const compileBtn = document.getElementById("compileBtn");
                compileBtn.disabled = false;
                compileBtn.innerText = "Compile Cinematic Video";
            } catch (err) {
                document.getElementById("engineStatus").innerHTML = "❌ Framework Load Fail";
                document.getElementById("engineStatus").style.color = "#dc2626";
            }
        }

        // 🟢 TRANSITION OPTIONS EMBEDDED INSIDE SCENARIO BLOCKS
        function generateSlideRows() {
            const wrapper = document.getElementById('slidesFormWrapper');
            const count = parseInt(document.getElementById('totalSlides').value) || 1;
            wrapper.innerHTML = '';
            
            for (let i = 0; i < count; i++) {
                const div = document.createElement('div');
                div.className = 'slide-card';
                div.innerHTML = `
                    <h3>🎬 Scenario ${i + 1}</h3>
                    
                    <div class="form-group">
                        <label>AI Voice Profile Actor:</label>
                        <select class="voice-input">${voiceOptionsHTML}</select>
                    </div>

                    <div class="form-group">
                        <label>Cinematic Slow Transition Video Style:</label>
                        <select class="transition-input">
                            <option value="zoomIn">Slow Ken Burns Zoom In (Cinematic Flow)</option>
                            <option value="zoomOut">Slow Ken Burns Zoom Out (Deep Reveal)</option>
                            <option value="panLeft">Slow Cinematic Pan Left</option>
                            <option value="panRight">Slow Cinematic Pan Right</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Narration Text Script:</label>
                        <input type="text" class="script-input" placeholder="Enter full paragraph text..." required>
                    </div>
                    
                    <div class="form-group">
                        <label>Media File Picker:</label>
                        <input type="file" class="media-input" accept="image/*" required>
                    </div>
                `;
                wrapper.appendChild(div);
            }
        }

        function chunkTextString(text) {
            return text.match(/[^.!?区域,，。！？\n]+[.!?区域,，।！？\n]*/g) || [text];
        }

        async function compileVideoOnDevice() {
            const log = document.getElementById('statusLogger');
            log.style.display = "block";
            log.innerHTML = "⏳ Spinning asset layers...";

            try {
                const cards = document.querySelectorAll('.slide-card');
                const totalSlides = cards.length;

                let slideDataArray = [];
                let overallAudioSamplesCount = 0;
                let samplingRate = 24000;

                for (let idx = 0; idx < totalSlides; idx++) {
                    const card = cards[idx];
                    const voiceName = card.querySelector('.voice-input').value;
                    const transitionStyle = card.querySelector('.transition-input').value;
                    const textVal = card.querySelector('.script-input').value;
                    const fileObj = card.querySelector('.media-input').files[0];

                    if (!textVal || !fileObj) {
                        throw new Error(`Missing values inside Scenario block ${idx + 1}.`);
                    }

                    log.innerHTML = `⚙️ Processing Scenario [${idx + 1}/${totalSlides}]:\n🗣️ Generating vocal arrays end-to-end...`;
                    
                    const textChunks = chunkTextString(textVal);
                    let compiledPCMChunks = [];

                    for (let c = 0; c < textChunks.length; c++) {
                        const subString = textChunks[c].trim();
                        if (subString.length === 0) continue;

                        const partialOutput = await globalTTSInstance.generate(subString, { voice: voiceName });
                        if (partialOutput && partialOutput.audio) {
                            compiledPCMChunks.push(partialOutput.audio);
                            samplingRate = partialOutput.sampling_rate;
                        }
                    }

                    let totalSegmentLength = compiledPCMChunks.reduce((acc, val) => acc + val.length, 0);
                    let slideMergedPCM = new Float32Array(totalSegmentLength);
                    let currentPCMOffset = 0;
                    for (let chunk of compiledPCMChunks) {
                        slideMergedPCM.set(chunk, currentPCMOffset);
                        currentPCMOffset += chunk.length;
                    }

                    log.innerHTML = `⚙️ Processing Scenario [${idx + 1}/${totalSlides}]:\n🎨 Center-cropping and formatting visual matrix elements...`;
                    const bufferedImage = await new Promise((resolve) => {
                        const r = new FileReader();
                        r.onload = (e) => {
                            const imageEl = new Image();
                            imageEl.onload = () => resolve(imageEl);
                            imageEl.src = e.target.result;
                        };
                        r.readAsDataURL(fileObj);
                    });

                    slideDataArray.push({
                        pcm: slideMergedPCM,
                        img: bufferedImage,
                        transition: transitionStyle,
                        samplesLength: slideMergedPCM.length,
                        duration: slideMergedPCM.length / samplingRate
                    });

                    overallAudioSamplesCount += slideMergedPCM.length;
                }

                log.innerHTML = "🎬 Binding master components into unified stream track layers...";
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: samplingRate });
                const mainAudioBuffer = audioCtx.createBuffer(1, overallAudioSamplesCount, samplingRate);
                const channelData = mainAudioBuffer.getChannelData(0);

                let currentWriteOffset = 0;
                for (let idx = 0; idx < slideDataArray.length; idx++) {
                    channelData.set(slideDataArray[idx].pcm, currentWriteOffset);
                    slideDataArray[idx].startSampleTime = currentWriteOffset / samplingRate;
                    currentWriteOffset += slideDataArray[idx].samplesLength;
                    slideDataArray[idx].endSampleTime = currentWriteOffset / samplingRate;
                }

                const totalAudioDuration = overallAudioSamplesCount / samplingRate;
                const canvas = document.getElementById('renderCanvas');
                const ctx = canvas.getContext('2d');
                
                // 🟢 UNIFORM CENTER CROP AND KINESIS ANIMATION LAYER ENGINE
                function drawCanvasFrameForTime(currentTime) {
                    let activeSlide = slideDataArray[0];
                    let activeIndex = 0;
                    for (let idx = 0; idx < slideDataArray.length; idx++) {
                        if (currentTime >= slideDataArray[idx].startSampleTime && currentTime <= slideDataArray[idx].endSampleTime) {
                            activeSlide = slideDataArray[idx];
                            activeIndex = idx;
                            break;
                        }
                    }

                    const img = activeSlide.img;
                    const targetWidth = 720;
                    const targetHeight = 1280;

                    // Calculate safe uniform center-crop sizing values
                    const imgRatio = img.width / img.height;
                    const targetRatio = targetWidth / targetHeight;
                    
                    let srcWidth, srcHeight, srcX, srcY;

                    if (imgRatio > targetRatio) {
                        srcHeight = img.height;
                        srcWidth = img.height * targetRatio;
                        srcX = (img.width - srcWidth) / 2;
                        srcY = 0;
                    } else {
                        srcWidth = img.width;
                        srcHeight = img.width / targetRatio;
                        srcX = 0;
                        srcY = (img.height - srcHeight) / 2;
                    }

                    // Progress mapping variable normalized between 0.0 and 1.0 for each scenario scene segment
                    const slideElapsed = currentTime - activeSlide.startSampleTime;
                    const progress = Math.min(slideElapsed / activeSlide.duration, 1.0);

                    ctx.clearRect(0, 0, targetWidth, targetHeight);
                    ctx.save();

                    // Apply active motion dynamics smoothly across timeline configurations
                    let scale = 1.0;
                    let moveX = 0;
                    let moveY = 0;

                    if (activeSlide.transition === "zoomIn") {
                        scale = 1.0 + (progress * 0.08); // Slow cinematic 8% uniform center zoom inward
                    } else if (activeSlide.transition === "zoomOut") {
                        scale = 1.08 - (progress * 0.08); // Slow deep reveal outward zoom
                    } else if (activeSlide.transition === "panLeft") {
                        moveX = -(progress * 40); // Slow panning speed mapping rules
                    } else if (activeSlide.transition === "panRight") {
                        moveX = (progress * 40);
                    }

                    // Translate canvas tracking origin straight through frame focal centers
                    ctx.translate(targetWidth / 2 + moveX, targetHeight / 2 + moveY);
                    ctx.scale(scale, scale);
                    ctx.translate(-targetWidth / 2, -targetHeight / 2);

                    // Render standard native imagery fully center cropped without borders
                    ctx.drawImage(img, srcX, srcY, srcWidth, srcHeight, 0, 0, targetWidth, targetHeight);
                    ctx.restore();
                }

                drawCanvasFrameForTime(0);

                const bufferSource = audioCtx.createBufferSource();
                bufferSource.buffer = mainAudioBuffer;

                const streamAudioDestination = audioCtx.createMediaStreamDestination();
                bufferSource.connect(streamAudioDestination);

                const canvasVideoStream = canvas.captureStream(30); // Render output stream at smooth 30fps
                const consolidatedOutputStream = new MediaStream([
                    canvasVideoStream.getVideoTracks()[0],
                    streamAudioDestination.stream.getAudioTracks()[0]
                ]);

                const recorder = new MediaRecorder(consolidatedOutputStream, { mimeType: 'video/webm;codecs=vp8,opus' });
                const storageChunks = [];
                recorder.ondataavailable = (e) => { if (e.data.size > 0) storageChunks.push(e.data); };

                let renderLoopId;
                const genesisTime = performance.now();

                recorder.onstop = () => {
                    cancelAnimationFrame(renderLoopId);
                    log.innerHTML = "🎉 Production Complete! Saving your cinematic presentation video file.";
                    const compiledBlob = new Blob(storageChunks, { type: 'video/webm' });
                    const downloadAnchor = document.createElement('a');
                    downloadAnchor.href = URL.createObjectURL(compiledBlob);
                    downloadAnchor.download = "talentglass_cinematic_reels.webm";
                    downloadAnchor.click();
                };

                function executionViewportHeartbeat() {
                    const runningTimestampSeconds = (performance.now() - genesisTime) / 1000;
                    drawCanvasFrameForTime(runningTimestampSeconds);
                    renderLoopId = requestAnimationFrame(executionViewportHeartbeat);
                }

                recorder.start();
                bufferSource.start(0);
                executionViewportHeartbeat();

                setTimeout(() => {
                    recorder.stop();
                    audioCtx.close();
                }, totalAudioDuration * 1000);

            } catch (err) {
                log.innerHTML = "❌ Generation Exception: " + err.message;
                console.error(err);
            }
        }
    </script>
</body>
</html>
