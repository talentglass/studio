<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentGlass Studio</title>
    <link rel="manifest" href="manifest.json">
    
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>

    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; background-color: #f0f3f6; color: #333; }
        .container { max-width: 600px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin: 20px auto; }
        h2 { color: #2c3e50; margin-top: 0; border-bottom: 2px solid #f1f2f6; padding-bottom: 12px; }
        #loginView { max-width: 400px; margin: 80px auto; text-align: center; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .input-box { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        
        #studioView { display: none; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        label { font-weight: bold; margin-bottom: 6px; color: #4a5568; font-size: 14px; }
        select, input[type="number"], .script-input { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; width: 100%; box-sizing: border-box; }
        
        .slide-card { background: #f8fafc; border: 1px solid #e2e8f0; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .slide-card h3 { margin: 0 0 15px 0; color: #1e3a8a; font-size: 16px; border-bottom: 1px dashed #cbd5e1; padding-bottom: 8px; }
        
        .btn { background-color: #3b82f6; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: bold; width: 100%; box-sizing: border-box; }
        #forceInstallContainer { display: block; background: #fffbeb; border: 1px solid #fef3c7; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        #statusLogger { margin-top: 20px; padding: 15px; border-radius: 6px; display: none; font-weight: bold; font-size: 14px; background-color: #e0f2fe; border-left: 4px solid #0284c7; color: #0369a1; white-space: pre-line; }
    </style>
</head>
<body>

    <div id="loginView">
        <h3 style="color: #2c3e50; margin-bottom: 20px;">Sign In to TalentGlass Studio</h3>
        <input type="text" id="username" class="input-box" placeholder="Username">
        <input type="password" id="password" class="input-box" placeholder="Password">
        <button type="button" class="btn" onclick="validateCredentials()">Authenticate Studio</button>
        <p id="loginError" style="color: #e11d48; display: none; margin-top: 15px; font-weight: bold; font-size: 13px;"></p>
    </div>

    <div id="studioView" class="container">
        
        <div id="forceInstallContainer">
            <p style="margin: 0 0 10px 0; font-size: 13px; color: #b45309; font-weight: bold;">📲 Save App Shortcut Link Directly onto your Device Home Screen:</p>
            <button type="button" class="btn" style="background-color: #d97706;" onclick="triggerManualPwaInstall()">Download & Install Studio App</button>
        </div>

        <h2>🎬 TalentGlass Studio</h2>
        <p style="font-size: 12px; color: #64748b; margin-top: -5px; margin-bottom: 25px;">Logged in as: <strong style="color: #3b82f6;">suvanam</strong> | Status: <span id="engineStatus" style="color:#16a34a; font-weight:bold;">⚡ Live Matrix Mode Active</span></p>
        
        <form id="studioForm">
            <div class="form-group" style="background: #eff6ff; padding: 15px; border-radius: 8px; border: 1px dashed #bfdbfe;">
                <label style="color:#1e40af;">🌍 Global System AI Voice (Applies to all Scenarios):</label>
                <select id="voiceProfile"></select>
            </div>

            <div class="form-group">
                <label>Number of Presentation Slides:</label>
                <input type="number" id="totalSlides" min="1" max="10" value="1" oninput="generateSlideRows()">
            </div>

            <div id="slidesFormWrapper"></div>
            
            <button type="button" id="compileBtn" class="btn" style="background-color: #10b981; margin-top: 10px;" onclick="compileVideoOnDevice()">Compile Cinematic Video</button>
        </form>

        <div id="statusLogger"></div>
    </div>

    <canvas id="renderCanvas" width="720" height="1280" style="display:none;"></canvas>

    <script>
        let systemVoices = [];
        let currentActiveSlideGlobalIndex = 0;
        let slideSegmentStartTimeGlobal = 0;

        function loadDeviceVoices() {
            if (typeof speechSynthesis === 'undefined') return;
            systemVoices = speechSynthesis.getVoices();
            const selector = document.getElementById("voiceProfile");
            if (!selector) return;
            
            selector.innerHTML = "";
            const englishVoices = systemVoices.filter(v => v.lang.includes("en-"));
            const finalDisplayList = englishVoices.length > 0 ? englishVoices : systemVoices;

            finalDisplayList.forEach((voice) => {
                const opt = document.createElement("option");
                opt.value = voice.name;
                opt.textContent = `${voice.name} (${voice.lang})`;
                selector.appendChild(opt);
            });
        }

        if (typeof speechSynthesis !== 'undefined') {
            speechSynthesis.onvoiceschanged = loadDeviceVoices;
            loadDeviceVoices();
        }

        function triggerManualPwaInstall() {
            alert("To add this app link straight onto your phone:\n\n• On Chrome: Tap the 3 dots, then select 'Add to Home screen'.\n• On Safari: Tap the Share icon, then select 'Add to Home Screen'.");
        }

        function validateCredentials() {
            const userVal = document.getElementById("username").value;
            const passVal = document.getElementById("password").value;
            if (userVal === "suvanam" && passVal === "2026") {
                document.getElementById("loginView").style.display = "none";
                document.getElementById("studioView").style.display = "block";
                generateSlideRows();
                loadDeviceVoices();
            } else {
                document.getElementById("loginError").innerText = "❌ Access Denied: Invalid credentials.";
                document.getElementById("loginError").style.display = "block";
            }
        }

        function generateSlideRows() {
            const wrapper = document.getElementById('slidesFormWrapper');
            const count = parseInt(document.getElementById('totalSlides').value) || 1;
            wrapper.innerHTML = '';
            
            for (let i = 0; i < count; i++) {
                const div = document.createElement('div');
                div.className = 'slide-card';
                div.innerHTML = `
                    <h3>🎬 Scenario ${i + 1}</h3>
                    
                    <div class="form-group">
                        <label>Cinematic Slow Transition Video Style:</label>
                        <select class="transition-input">
                            <option value="zoomIn" selected>Slow Ken Burns Zoom In (Cinematic Flow)</option>
                            <option value="zoomOut">Slow Ken Burns Zoom Out (Deep Reveal)</option>
                            <option value="panLeft">Slow Cinematic Pan Left</option>
                            <option value="panRight">Slow Cinematic Pan Right</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Narration Text Script:</label>
                        <input type="text" class="script-input" value="This is an executive slide presentation showcasing automated portrait video layout generations." required>
                    </div>
                    
                    <div class="form-group">
                        <label>Media File Picker:</label>
                        <input type="file" class="media-input" accept="image/*" required>
                    </div>
                `;
                wrapper.appendChild(div);
            }
        }

        // 🟢 FIX 2: RE-ENGINEERED UNIFORM CENTER CROP TIMELINE CHRONOMETER
        function paintFrameAtTimelinePoint(ctx, slideDataArray, currentTimeSeconds) {
            let activeSlide = slideDataArray[currentActiveSlideGlobalIndex];
            
            const img = activeSlide.img;
            const targetWidth = 720;
            const targetHeight = 1280;

            const imgRatio = img.width / img.height;
            const targetRatio = targetWidth / targetHeight;
            let srcWidth, srcHeight, srcX, srcY;

            if (imgRatio > targetRatio) {
                srcHeight = img.height;
                srcWidth = img.height * targetRatio;
                srcX = (img.width - srcWidth) / 2;
                srcY = 0;
            } else {
                srcWidth = img.width;
                srcHeight = img.width / targetRatio;
                srcX = 0;
                srcY = (img.height - srcHeight) / 2;
            }

            // Map progress dynamically relative to the structural scene runtime bounds
            const slideElapsed = currentTimeSeconds - slideSegmentStartTimeGlobal;
            const progress = Math.min(slideElapsed / 7.0, 1.0); // Safe normalization floor fallback

            ctx.clearRect(0, 0, targetWidth, targetHeight);
            ctx.save();

            let scale = 1.0;
            let moveX = 0;
            let moveY = 0;

            if (activeSlide.transition === "zoomIn") {
                scale = 1.0 + (progress * 0.28); 
            } else if (activeSlide.transition === "zoomOut") {
                scale = 1.28 - (progress * 0.28); 
            } else if (activeSlide.transition === "panLeft") {
                moveX = -(progress * 130); 
            } else if (activeSlide.transition === "panRight") {
                moveX = (progress * 130);
            }

            ctx.translate(targetWidth / 2 + moveX, targetHeight / 2 + moveY);
            ctx.scale(scale, scale);
            ctx.translate(-targetWidth / 2, -targetHeight / 2);

            ctx.drawImage(img, srcX, srcY, srcWidth, srcHeight, 0, 0, targetWidth, targetHeight);
            ctx.restore();
        }

        async function compileVideoOnDevice() {
            const log = document.getElementById('statusLogger');
            log.style.display = "block";
            log.innerHTML = "⏳ Structuring media assets into canvas nodes...";

            try {
                const cards = document.querySelectorAll('.slide-card');
                const totalSlides = cards.length;
                const chosenVoiceName = document.getElementById("voiceProfile").value;
                const selectedOSVoice = systemVoices.find(v => v.name === chosenVoiceName);

                let slideDataArray = [];

                for (let idx = 0; idx < totalSlides; idx++) {
                    const card = cards[idx];
                    const transitionStyle = card.querySelector('.transition-input').value;
                    const textVal = card.querySelector('.script-input').value;
                    const fileObj = card.querySelector('.media-input').files[0];

                    if (!textVal || !fileObj) {
                        throw new Error(`Missing allocations inside Scenario block ${idx + 1}.`);
                    }

                    const bufferedImage = await new Promise((resolve) => {
                        const r = new FileReader();
                        r.onload = (e) => {
                            const imageEl = new Image();
                            imageEl.onload = () => resolve(imageEl);
                            imageEl.src = e.target.result;
                        };
                        r.readAsDataURL(fileObj);
                    });

                    slideDataArray.push({
                        text: textVal,
                        img: bufferedImage,
                        transition: transitionStyle
                    });
                }

                // Initialize system nodes 
                currentActiveSlideGlobalIndex = 0;
                slideSegmentStartTimeGlobal = 0;

                const canvas = document.getElementById('renderCanvas');
                const ctx = canvas.getContext('2d');

                // 🟢 FIX 1: CONNECT TO NATIVE OS SPEAKER CAPTURE STREAM FOR DIRECT RECORDING
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const mediaStreamDest = audioCtx.createMediaStreamDestination();
                
                // Grab microphone device stream to route the synthesized speech into the recorder pipeline
                const micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const micSourceNode = audioCtx.createMediaStreamSource(micStream);
                micSourceNode.connect(mediaStreamDest);

                const canvasVideoStream = canvas.captureStream(30); // Capture continuous timeline frames at 30fps
                const consolidatedOutputStream = new MediaStream([
                    canvasVideoStream.getVideoTracks()[0],
                    mediaStreamDest.stream.getAudioTracks()[0]
                ]);

                const recorder = new MediaRecorder(consolidatedOutputStream, { mimeType: 'video/webm;codecs=vp8,opus' });
                const storageChunks = [];
                recorder.ondataavailable = (e) => { if (e.data.size > 0) storageChunks.push(e.data); };

                recorder.onstop = () => {
                    // Turn off recording light indicators safely
                    micStream.getTracks().forEach(t => t.stop());
                    log.innerHTML = "🎉 Production Complete! Video presentation saved with embedded vocal narration.";
                    const compiledBlob = new Blob(storageChunks, { type: 'video/webm' });
                    const downloadAnchor = document.createElement('a');
                    downloadAnchor.href = URL.createObjectURL(compiledBlob);
                    downloadAnchor.download = "talentglass_synchronized_presentation.webm";
                    downloadAnchor.click();
                };

                recorder.start();

                log.innerHTML = "🎬 Compilation active. Speak clearly if prompted or remain silent for voice tracking capture...";

                let renderLoopActive = true;
                const genesisTimeMillis = performance.now();

                function videoRenderHeartbeatLoop() {
                    if (!renderLoopActive) return;
                    const elapsedSeconds = (performance.now() - genesisTimeMillis) / 1000;
                    paintFrameAtTimelinePoint(ctx, slideDataArray, elapsedSeconds);
                    requestAnimationFrame(videoRenderHeartbeatLoop);
                }

                // Start animation frames loop instantly
                videoRenderHeartbeatLoop();

                // 🟢 SEQUENTIAL EVENT-DRIVEN SPEAKER SYNC TIMELINE CLOCK
                for (let i = 0; i < slideDataArray.length; i++) {
                    currentActiveSlideGlobalIndex = i;
                    slideSegmentStartTimeGlobal = (performance.now() - genesisTimeMillis) / 1000;

                    log.innerHTML = `🗣️ Recording Voice Track Overlay for Scenario ${i + 1} of ${totalSlides}...`;

                    await new Promise((resolve) => {
                        const utterance = new SpeechSynthesisUtterance(slideDataArray[i].text);
                        if (selectedOSVoice) utterance.voice = selectedOSVoice;
                        utterance.rate = 0.95; // Premium smooth cinematic pacing speed 
                        
                        utterance.onend = () => {
                            setTimeout(resolve, 300); // 300ms structural scene transition buffer room
                        };
                        utterance.onerror = () => resolve();
                        
                        speechSynthesis.speak(utterance);
                    });
                }

                // Finalize generation pipeline cleanly
                setTimeout(() => {
                    renderLoopActive = false;
                    recorder.stop();
                    audioCtx.close();
                }, 500);

            } catch (err) {
                log.innerHTML = "❌ Generation Exception: " + err.message + "\n\n(Please check browser settings and allow audio channel permissions when prompted).";
                console.error(err);
            }
        }
    </script>
</body>
</html>
