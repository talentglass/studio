<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentGlass Studio</title>
    <link rel="manifest" href="manifest.json">
    
    <script src="coi-serviceworker.js"></script>
    
    <script type="module">
        import { KokoroTTS } from "https://cdn.jsdelivr.net/npm/kokoro-js@1.1.0/+esm";
        window.KokoroTTS = KokoroTTS;
    </script>

    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; background-color: #f0f3f6; color: #333; }
        .container { max-width: 600px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin: 20px auto; }
        h2 { color: #2c3e50; margin-top: 0; border-bottom: 2px solid #f1f2f6; padding-bottom: 12px; }
        
        #loginView { max-width: 400px; margin: 80px auto; text-align: center; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .input-box { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        
        #studioView { display: none; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        label { font-weight: bold; margin-bottom: 6px; color: #4a5568; font-size: 14px; }
        select, input[type="number"] { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; }
        .slide-card { background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 6px; margin-bottom: 15px; }
        .slide-card input[type="text"] { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; margin-bottom: 10px; }
        
        .btn { background-color: #3b82f6; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: bold; width: 100%; box-sizing: border-box; }
        #statusLogger { margin-top: 20px; padding: 15px; border-radius: 6px; display: none; font-weight: bold; font-size: 14px; background-color: #e0f2fe; border-left: 4px solid #0284c7; color: #0369a1; }
    </style>
</head>
<body>

    <div id="loginView">
        <h3 style="color: #2c3e50; margin-bottom: 20px;">Sign In to TalentGlass Studio</h3>
        <input type="text" id="username" class="input-box" placeholder="Username">
        <input type="password" id="password" class="input-box" placeholder="Password">
        <button type="button" class="btn" onclick="validateCredentials()">Authenticate Studio</button>
        <p id="loginError" style="color: #e11d48; display: none; margin-top: 15px; font-weight: bold; font-size: 13px;"></p>
    </div>

    <div id="studioView" class="container">
        <h2>🎬 Downloadable TalentGlass Studio</h2>
        <p style="font-size: 12px; color: #64748b; margin-top: -5px; margin-bottom: 25px;">Logged in as: <strong style="color: #3b82f6;">suvanam</strong>. Portrait rendering core (9:16 Reels optimization active).</p>
        
        <form id="studioForm">
            <div class="form-group">
                <label>AI Voice Profile Actor:</label>
                <select id="voiceProfile">
                    <option value="af_bella">af_bella (Female - Clean)</option>
                    <option value="af_nicole">af_nicole (Female - Professional)</option>
                    <option value="am_adam">am_adam (Male - Deep Narration)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Number of Presentation Slides:</label>
                <input type="number" id="totalSlides" min="1" max="10" value="1" oninput="generateSlideRows()">
            </div>

            <div id="slidesFormWrapper"></div>
            <button type="button" class="btn" style="background-color: #10b981; margin-top: 10px;" onclick="compileVideoOnDevice()">Compile Video Natively</button>
        </form>

        <div id="statusLogger"></div>
    </div>

    <canvas id="renderCanvas" width="720" height="1280" style="display:none;"></canvas>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        function validateCredentials() {
            const userVal = document.getElementById("username").value;
            const passVal = document.getElementById("password").value;
            const errorBox = document.getElementById("loginError");

            if (userVal === "suvanam" && passVal === "2026") {
                document.getElementById("loginView").style.display = "none";
                document.getElementById("studioView").style.display = "block";
                generateSlideRows();
            } else {
                errorBox.innerText = "❌ Access Denied: Invalid parameters.";
                errorBox.style.display = "block";
            }
        }

        function generateSlideRows() {
            const wrapper = document.getElementById('slidesFormWrapper');
            const count = parseInt(document.getElementById('totalSlides').value) || 1;
            wrapper.innerHTML = '';
            
            for (let i = 0; i < count; i++) {
                const div = document.createElement('div');
                div.className = 'slide-card';
                div.innerHTML = `
                    <label style="color: #64748b; font-size: 13px;">Slide ${i + 1} Script Text:</label>
                    <input type="text" class="script-input" placeholder="Type what the AI actor should speak..." required>
                    <input type="file" class="media-input" accept="image/*" required>
                `;
                wrapper.appendChild(div);
            }
        }

        async function compileVideoOnDevice() {
            const log = document.getElementById('statusLogger');
            log.style.display = "block";
            log.innerHTML = "⏳ Spinning up offline matrix cores...";

            try {
                log.innerHTML = "🧠 Connecting to Kokoro AI voice processor (Scanning IndexedDB local cache)...";
                const tts = await window.KokoroTTS.from_pretrained("onnx-community/Kokoro-82M-v1.0-ONNX", {
                    dtype: "q8",
                    device: "wasm"
                });

                const scripts = document.querySelectorAll('.script-input');
                const visuals = document.querySelectorAll('.media-input');
                
                log.innerHTML = "⚙️ Synthesizing presentation speech layout...";
                const text = scripts[0].value;
                const fileObj = visuals[0].files[0];
                if (!fileObj) throw new Error("Please upload an image asset file template.");

                const chosenVoice = document.getElementById("voiceProfile").value;
                const audioOutput = await tts.generate(text, { voice: chosenVoice });
                
                const rawPCM = audioOutput.audio;
                const sRate = audioOutput.sampling_rate;
                const originalAudioDuration = rawPCM.length / sRate;
                const totalDuration = 2.0 + originalAudioDuration + 2.0;

                log.innerHTML = "🎬 Resizing media slides into vertical frames...";
                const img = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const el = new Image();
                        el.onload = () => resolve(el);
                        el.src = e.target.result;
                    };
                    reader.readAsDataURL(fileObj);
                });

                // Target our portrait setup frames
                const canvas = document.getElementById('renderCanvas');
                const ctx = canvas.getContext('2d');
                
                // 🟢 Clean Frame Buffering: Generate clean background layout
                ctx.fillStyle = "#1e293b"; // Dark premium grey presentation backup color canvas background
                ctx.fillRect(0, 0, 720, 1280);

                // 🟢 NATIVE AUTOMATIC SHRINK-TO-FIT / CROP ASPECT RATIO LOGIC
                const targetWidth = 720;
                const targetHeight = 1280;
                const imgWidth = img.width;
                const imgHeight = img.height;

                const ratio = Math.min(targetWidth / imgWidth, targetHeight / imgHeight);
                const renderWidth = imgWidth * ratio;
                const renderHeight = imgHeight * ratio;
                
                const offsetX = (targetWidth - renderWidth) / 2;
                const offsetY = (targetHeight - renderHeight) / 2;

                // Draw image beautifully downscaled without any distortion or stretching
                ctx.drawImage(img, offsetX, offsetY, renderWidth, renderHeight);

                const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: sRate });
                const audioBuffer = audioCtx.createBuffer(1, rawPCM.length, sRate);
                audioBuffer.getChannelData(0).set(rawPCM);

                const bufferSource = audioCtx.createBufferSource();
                bufferSource.buffer = audioBuffer;

                const audioDestination = audioCtx.createMediaStreamDestination();
                bufferSource.connect(audioDestination);

                const videoStream = canvas.captureStream(25); 
                const combinedStream = new MediaStream([
                    videoStream.getVideoTracks()[0],
                    audioDestination.stream.getAudioTracks()[0]
                ]);

                const mediaRecorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm;codecs=vp8,opus' });
                const recordedChunks = [];

                mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
                
                mediaRecorder.onstop = () => {
                    log.innerHTML = "🎉 Done! Saving portrait video to your storage directory.";
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const downloadLink = URL.createObjectURL(blob);
                    const anchor = document.createElement('a');
                    anchor.href = downloadLink;
                    anchor.download = "talentglass_portrait_presentation.webm";
                    anchor.click();
                };

                mediaRecorder.start();
                
                setTimeout(() => {
                    bufferSource.start(0);
                }, 2000);

                setTimeout(() => {
                    mediaRecorder.stop();
                    audioCtx.close();
                }, totalDuration * 1000);

            } catch (err) {
                log.innerHTML = "❌ Generation Exception: " + err.message;
                console.error(err);
            }
        }
    </script>
</body>
</html>
